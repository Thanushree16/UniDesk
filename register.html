<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register|UniDesk</title>
     <link rel="stylesheet" href="css/registerstyle.css">
    <link rel="background" href="assets/images/Pattern(1).png">
</head>
<body>
    <div class="welcome-banner">Step Into Smart Studying with UniDesk.</div>
    <div class="container">
        <div class="left-panel">
            <img class="main-image" src="assets/images/register.gif" alt="Register Animation" >
        </div>
        <div class="right-panel">
            <div class="logo">
                <img src="assets/images/Logo.png" alt="UniDesk Logo" class="logo-icon" >
            </div>
            <div class="register-box">
                <h2>Register</h2>
                <form action="/register" method="post" autocomplete="off">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                    <label for="roll">Roll Number</label>
                    <input type="text" id="roll" name="roll" required autocomplete="username">
                    <label for="semester">Enter your current semester</label>
                    <input type="number" id="semester" name="semester" min="1" max="8" required>
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
                    <button type="submit">Register</button>
                </form>
                <div class="login-link">
                    Already have an account?
                    <a href="login.html"><u>Login</u></a>
                </div>
            </div>
</body>
</html>
