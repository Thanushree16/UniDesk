<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UniDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="background" href="assets/images/Pattern(1).png">
</head>
<body>
    <div class="welcome-banner">Welcome Back To UniDesk!</div>
    <div class="container">
        <div class="left-panel">
            <img class="main-image" src="assets/images/animated.gif" alt="Login Animation" > 
        </div>
        <div class="right-panel">
            <div class="logo">
                <img src="assets/images/Logo.png" alt="UniDesk Logo" class="logo-icon" >
            </div>
            <div class="login-box">
                <h2>Login</h2>
                <p>Good to see you here again!</p>
                <form action="/login" method="post" autocomplete="off">
                    <label for="roll">Enter your roll number</label>
                    <input type="text" id="roll" name="roll" required autocomplete="username">
                    <label for="password">Enter your password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <div class="options-row">
                        <label><input type="checkbox" name="stay_signed_in"> Stay signed in</label>
                        <a href="forgot.html"><u>Forgot password?</u></a>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div class="signup-link">
                    Don't have an account?
                    <a href="register.html"><u>Sign up</u></a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
